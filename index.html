<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounting Lab - Esercizio Contabile MultiStep</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #e74c3c;
            --bg: #f8f9fa;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            margin: 0;
            padding: 15px;
            color: #333;
        }

        .container { max-width: 1200px; margin: auto; }

        .panel {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }

        h2 {
            color: var(--primary);
            border-left: 5px solid var(--accent);
            padding-left: 15px;
            margin: 15px 0 20px 0;
            font-size: 1.3rem;
        }

        .grid-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            align-items: end;
        }

        .builder-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 12px;
        }

        .builder-grid .full { grid-column: 1 / -1; }

        .builder-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
        }

        .tx-list {
            margin-top: 10px;
            border: 1px solid #e6e6e6;
            border-radius: 8px;
            overflow: hidden;
        }

        .tx-item {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            align-items: center;
            padding: 8px 10px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.85rem;
        }

        .tx-item:last-child { border-bottom: none; }

        .tx-empty {
            padding: 10px;
            font-size: 0.85rem;
            color: #6b7280;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 14px;
        }

        button:hover { background: #2980b9; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-prev { background: #95a5a6; }
        .btn-next { background: var(--accent); }
        .btn-secondary { background: #95a5a6; }
        .btn-danger { background: #e74c3c; }
        .btn-example { background: #16a085; }

        .journal-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 6px;
            font-size: 0.9rem;
        }

        .journal-table th {
            padding: 12px;
            text-align: left;
            color: var(--secondary);
            font-weight: 600;
            border-bottom: 2px solid #eee;
            font-size: 0.85rem;
        }

        .journal-row {
            background: white;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        .journal-row td {
            padding: 12px;
            border: 1px solid #eee;
        }

        .badge {
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .vfa { background: #d4edda; color: #155724; }
        .vfp { background: #f8d7da; color: #721c24; }
        .ven { background: #fff3cd; color: #856404; }
        .vep { background: #d1ecf1; color: #0c5460; }

        .mastrini-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }

        .mastrino-t {
            background: white;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .t-header {
            text-align: center;
            font-weight: bold;
            padding: 8px;
            border-bottom: 2px solid var(--primary);
            background: #eee;
            font-size: 0.85rem;
        }

        .t-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: 80px;
            position: relative;
        }

        .t-content::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--primary);
        }

        .t-side { padding: 8px; font-size: 0.75rem; }
        .t-footer { border-top: 1px solid #ccc; padding: 4px; text-align: center; font-weight: bold; font-size: 0.8rem; }

        .bilancio-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .statement {
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .statement h3 { margin: 0 0 12px 0; font-size: 0.95rem; }
        .statement table { width: 100%; font-size: 0.8rem; border-collapse: collapse; }
        .statement table tr { border-bottom: 1px solid #eee; }
        .statement table td { padding: 6px; }
        .val { text-align: right; font-family: 'Courier New', Courier, monospace; }
        .total-box { background: var(--primary); color: white; padding: 8px; margin-top: 8px; border-radius: 4px; font-size: 0.9rem; }

        .step-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
        }

        .step-header h1 { margin: 0 0 8px 0; font-size: 1.5rem; }
        .step-description { font-size: 0.95rem; line-height: 1.5; margin: 10px 0; opacity: 0.95; }
        .step-badge { display: inline-block; background: rgba(255, 255, 255, 0.2); padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; margin: 8px 0; }

        .step-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            gap: 6px;
            overflow-x: auto;
            padding: 5px 0;
        }

        .step-dot {
            width: 35px;
            height: 35px;
            min-width: 35px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.7rem;
        }

        .step-dot.active {
            background: var(--accent);
            color: white;
            transform: scale(1.15);
            box-shadow: 0 0 12px rgba(52, 152, 219, 0.5);
        }

        .step-dot.completed { background: var(--success); color: white; }
        .step-line { flex: 1; height: 1px; background: #ddd; min-width: 8px; }
        .step-line.active { background: var(--accent); }

        .step-nav {
            display: grid;
            grid-template-columns: auto 1fr auto;
            gap: 12px;
            margin-top: 20px;
            align-items: center;
        }

        .step-nav button {
            padding: 10px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            font-size: 13px;
        }

        .step-info {
            background: #ecf0f1;
            padding: 12px;
            border-left: 4px solid var(--accent);
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        @media (max-width: 767px) {
            body { padding: 8px; }
            .panel { padding: 12px; margin-bottom: 15px; border-radius: 8px; }
            .builder-grid, .grid-form, .bilancio-grid, .mastrini-wrapper { grid-template-columns: 1fr; }
            .step-nav { grid-template-columns: 1fr 1fr; }
            #stepCounter { grid-column: 1 / -1; order: -1; }
            .journal-table thead { display: none; }
            .journal-table, .journal-table tbody, .journal-row, .journal-row td { display: block; width: 100%; }
            .journal-row td::before { content: attr(data-label); font-weight: bold; display: block; font-size: 0.7rem; color: #666; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="step-header">
            <h1 id="stepTitle">Accounting Lab - Esercizio Didattico</h1>
            <p id="stepPhase" class="step-badge" style="margin-right: 10px;">Operazione</p>
            <p id="stepDescription" class="step-description"></p>
        </div>

        <div class="step-progress" id="stepProgress"></div>
        <div id="stepInfo" class="step-info" style="display: none;"></div>

        <div class="panel">
            <h2>Editor Esercizio Multi-Step</h2>
            <div class="builder-grid">
                <div>
                    <label for="editorTitle">Titolo step</label>
                    <input id="editorTitle" type="text" placeholder="Es. Acquisto merci a credito">
                </div>
                <div class="full">
                    <label for="editorDescriptionCap">Testo Capitalizzazione</label>
                    <textarea id="editorDescriptionCap" placeholder="Scrivi la parte di capitalizzazione dello step"></textarea>
                </div>
                <div class="full">
                    <label for="editorDescriptionLiq">Testo Liquidazione</label>
                    <textarea id="editorDescriptionLiq" placeholder="Scrivi la parte di liquidazione dello step"></textarea>
                </div>
            </div>

            <h3>Aggiungi movimento contabile</h3>
            <div class="grid-form">
                <div>
                    <label for="txConto">Conto</label>
                    <input id="txConto" type="text" placeholder="Es. Merci c/acquisti">
                </div>
                <div>
                    <label for="txSezione">Sezione</label>
                    <select id="txSezione">
                        <option value="capitalizzazione">Capitalizzazione</option>
                        <option value="liquidazione">Liquidazione</option>
                    </select>
                </div>
                <div>
                    <label for="txTipoVar">Analisi</label>
                    <select id="txTipoVar">
                        <option value="VFA">VFA</option>
                        <option value="VFP">VFP</option>
                        <option value="VEN">VEN</option>
                        <option value="VEP">VEP</option>
                    </select>
                </div>
                <div>
                    <label for="txCategoria">Prospetto</label>
                    <select id="txCategoria">
                        <option value="SP">SP</option>
                        <option value="CE">CE</option>
                    </select>
                </div>
                <div>
                    <label for="txImporto">Importo euro</label>
                    <input id="txImporto" type="number" min="0" step="0.01" placeholder="0.00">
                </div>
                <div>
                    <label for="txDescrizione">Descrizione</label>
                    <input id="txDescrizione" type="text" placeholder="Dettaglio movimento">
                </div>
                <button onclick="addTransactionToCurrentStep()">Aggiungi movimento</button>
            </div>

            <div id="txList" class="tx-list"></div>

            <div class="builder-actions">
                <button class="btn-secondary" onclick="saveCurrentStep()">Salva step</button>
                <button class="btn-example" onclick="loadCasoDeltaExample()">Carica esempio Caso Delta</button>
                <button onclick="createNewStep()">Nuovo step</button>
                <button class="btn-danger" onclick="deleteCurrentStep()">Elimina step</button>
            </div>
        </div>

        <div id="stepContent"></div>

        <div class="step-nav">
            <button class="btn-prev" id="prevBtn" onclick="prevStep()">← Indietro</button>
            <span id="stepCounter" style="text-align: center; padding: 12px;"></span>
            <button class="btn-next" id="nextBtn" onclick="nextStep()">Avanti →</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="app.js" defer></script>
</body>
</html>
